- name: Configure interfaces safely
  hosts: Routers
  gather_facts: no

  tasks:

    - name: Enable Multiple Interfaces
      cisco.ios.ios_config:
        lines:
          - interface range FastEthernet 1/0 , FastEthernet 2/0
          - description configured by Ansible
          - shutdown

    - name: Display results
      debug:
        var: config_result